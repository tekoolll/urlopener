<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>uarel</title>

<link rel="icon" type="image/x-icon" href="images/favicon.ICO">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
margin:0;
height:100vh;
overflow:hidden;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{
position:relative;
z-index:1;
width:420px;
max-width:92vw;
padding:40px;
border-radius:20px;

background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);

box-shadow:0 20px 60px rgba(0,0,0,.5);
}

h1{
margin:0 0 25px 0;
font-size:26px;
text-align:center;
}

input{
width:100%;
padding:16px;
border-radius:12px;
border:none;
outline:none;

background:rgba(255,255,255,.07);
color:white;
font-size:16px;

transition:.25s;
}

input:focus{
background:rgba(255,255,255,.12);
}

.options{
margin-top:20px;
display:flex;
gap:15px;
}

.option{
flex:1;
padding:16px;
border-radius:12px;
text-align:center;
cursor:pointer;

background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);

transition:.25s;
font-size:15px;
}

.option.active{
background:linear-gradient(135deg,#00c6ff,#0072ff);
border:none;
}

.option:hover{
transform:translateY(-2px);
}

button{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:12px;

background:linear-gradient(135deg,#7c3aed,#4f46e5);
color:white;
font-size:16px;
font-weight:500;

cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(124,58,237,.6);
}

.footer{
text-align:center;
margin-top:12px;
font-size:12px;
opacity:.6;
}

/* bottom credit */

.credit{
position:fixed;
bottom:12px;
left:14px;
font-size:14px;
opacity:.85;
z-index:2;
}

.credit a{
color:#3b82f6;
text-decoration:none;
font-weight:600;
}

.credit a:hover{
text-decoration:underline;
}

/* mobile adjustments */

@media (max-width:600px){

.container{
width:88vw;
padding:28px 22px;
}

h1{
font-size:24px;
}

input{
font-size:16px;
padding:15px;
}

button{
font-size:16px;
padding:15px;
}

.option{
padding:15px;
font-size:15px;
}

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<h1>Open a Link</h1>

<input id="urlInput" placeholder="">

<div class="options">

<div class="option active" data-mode="newtab">
New Tab
</div>

<div class="option" data-mode="same">
Same Window
</div>

</div>

<button onclick="openLink()">Open Link</button>

<div class="footer">Press Enter to open</div>

</div>

<div class="credit">
❤️ made by <a href="https://tke.pages.dev" target="_blank"><b>tekool</b></a>
</div>

<script>

let mode="newtab"

document.querySelectorAll(".option").forEach(option=>{
option.onclick=()=>{
document.querySelectorAll(".option").forEach(o=>o.classList.remove("active"))
option.classList.add("active")
mode=option.dataset.mode
}
})

function openLink(){

let input=document.getElementById("urlInput")
let url=input.value.trim()

if(url==="") return

if(!url.startsWith("http")){
url="https://"+url
}

if(mode==="newtab"){
window.open(url,"_blank")
}else{
window.location.href=url
}

}

document.getElementById("urlInput").addEventListener("keydown",e=>{
if(e.key==="Enter") openLink()
})

let examples=[
"google.com",
"youtube.com",
"apple.com",
"github.com",
"chatgpt.com"
]

let exampleIndex=0
let charIndex=0
let deleting=false
let input=document.getElementById("urlInput")

function typeEffect(){

let text=examples[exampleIndex]

if(!deleting){
charIndex++
}else{
charIndex--
}

input.placeholder=text.substring(0,charIndex)

if(!deleting && charIndex===text.length){
deleting=true
setTimeout(typeEffect,1200)
return
}

if(deleting && charIndex===0){
deleting=false
exampleIndex=(exampleIndex+1)%examples.length
}

setTimeout(typeEffect,deleting?40:80)

}

typeEffect()

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let mouse={x:null,y:null}

window.addEventListener("mousemove",e=>{
mouse.x=e.x
mouse.y=e.y
})

let particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-.5)*.5,
vy:(Math.random()-.5)*.5,
size:2
})
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy

if(p.x<0||p.x>canvas.width) p.vx*=-1
if(p.y<0||p.y>canvas.height) p.vy*=-1

if(mouse.x){
let dx=mouse.x-p.x
let dy=mouse.y-p.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){
p.x-=dx*.01
p.y-=dy*.01
}
}

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,.5)"
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>

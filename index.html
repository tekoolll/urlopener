<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>URL Opener</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#1e3c72,#2a5298,#141e30,#243b55);
background-size:400% 400%;
animation:bg 15s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
backdrop-filter:blur(20px);
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:18px;
padding:40px;
width:420px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
}

h1{
margin-top:0;
font-weight:600;
font-size:26px;
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
transition:.25s;
}

input:focus{
background:rgba(255,255,255,.12);
}

.options{
margin-top:18px;
display:flex;
gap:20px;
font-size:14px;
}

label{
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
}

button{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,114,255,.5);
}

button:active{
transform:translateY(0);
}

.footer{
text-align:center;
margin-top:12px;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<h1>Open a Link</h1>

<input id="urlInput" placeholder="https://example.com">

<div class="options">

<label>
<input type="radio" name="mode" value="newtab" checked>
New Tab
</label>

<label>
<input type="radio" name="mode" value="same">
Same Window
</label>

</div>

<button onclick="openLink()">Open Link</button>

<div class="footer">Press Enter to open</div>

</div>

<script>

function openLink(){

let url=document.getElementById("urlInput").value.trim()
let mode=document.querySelector('input[name="mode"]:checked').value

if(url==="") return

if(!url.startsWith("http")){
url="https://"+url
}

if(mode==="newtab"){
window.open(url,"_blank")
}else{
window.location.href=url
}

}

document.getElementById("urlInput").addEventListener("keydown",function(e){
if(e.key==="Enter"){
openLink()
}
})

</script>

</body>
</html>
